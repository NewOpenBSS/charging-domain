version: "1.0.0"
title: "Feature Design (Stage 3)"
description: "Stage 3 — Feature Design. Triggered by branch push (automated) or run interactively. Writes CURRENT.md to feature branches."

parameters:
  - key: branch_name
    input_type: string
    requirement: optional
    default: ""
    description: "Branch name to design (e.g. feature/F-001-charging-trace-store). If not provided, presents interactive list."

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true

settings:
  max_turns: 100

instructions: |
  You are running a Feature Design session — Stage 3 of the AI development process.
  Your job is to write a CURRENT.md task spec to the correct feature branch.

  ## Step 1 — Bootstrap
  Determine the working directory:
  - If running via GitHub Actions, the current directory IS the repo
    (actions/checkout already ran). Use the current directory.
  - If running interactively, use the current directory.

  Run: git fetch origin && git checkout main && git pull origin main

  ## Step 2 — Read Context
  Read these files in order:
  1. docs/PROJECT_BRIEF.md
  2. docs/ARCHITECTURE.md
  3. docs/PROJECT_STRUCTURE.md
  4. .ai/memory/STATUS.md
  5. All files in .ai/context/
  6. .ai/memory/FEATURES.md


  ## Step 3 — Identify the Feature
  Check if branch_name parameter was provided:

  IF branch_name is provided (automated/server mode):
    - Extract the Feature ID from the branch name
      e.g. feature/F-001-charging-trace-store → F-001
    - Find F-001 in FEATURES.md
    - Proceed directly to Step 4

  IF branch_name is NOT provided (interactive mode):
    - Extract all Features from FEATURES.md where Status is "Backlog"
    - Present as a numbered list and wait for human selection
    - Use the selected Feature ID for Step 4

  If no matching Feature found in FEATURES.md — stop and report.

  ## Step 4 — Check Implementation Approval
  Read the Feature's "Implementation Approval Required" field.

  If "Yes — pause after AI Design":
    Present the decomposition plan and wait for human confirmation.

  If "No — proceed automatically":
    Proceed directly without waiting.

  ## Step 5 — Analyse the Codebase
  Read the relevant source files to understand what already exists.
  Identify what needs to be built, what can be reused, where it lives.

  ## Step 6 — Write CURRENT.md to the Branch
  For each branch associated with this Feature, in dependency order:

  a) Checkout the branch:
     git checkout feature/<F-NNN>-<feature-name>

  b) Write .ai/tasks/CURRENT.md using .ai/tasks/TASK_TEMPLATE.md. Include:
     - Objective: what this feature builds
     - Scope: in and out of scope
     - Context: relevant existing code references
     - Acceptance criteria: outcome criteria only from the Feature
     - Risk assessment: risks to critical business logic
     - Feature ID this task belongs to

  c) Commit and push:
     git add .ai/tasks/CURRENT.md
     git commit -m "design: add CURRENT.md for <F-NNN>-<feature-name>"
     git push

  d) Verify commit landed:
     git show HEAD:.ai/tasks/CURRENT.md | head -3

  e) Return to main:
     git checkout main

  ## Step 7 — Update FEATURES.md
  - Update Feature status to "In Design"
  - Commit and push:
    git add .ai/memory/FEATURES.md
    git commit -m "design: F-NNN In Design"
    git push

  ## Step 8 — Report Completion
  State which branches received CURRENT.md and confirm completion.

prompt: |
  Starting Feature Design session.
  {% if branch_name %}
  Triggered for branch: {{ branch_name }}
  Reading context and writing CURRENT.md automatically.
  {% else %}
  Please read the context and FEATURES.md, then present available
  features for selection.
  {% endif %}
