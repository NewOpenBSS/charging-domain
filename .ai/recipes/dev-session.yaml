version: "1.0.0"
title: "Dev Session"
description: "Stage 4 — Development. Reads CURRENT.md from the current branch and implements autonomously to PR. Run from inside the feature branch."

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true

settings:
  max_turns: 200

instructions: |
  You are running a Dev Session — Stage 4 of the agentic development pipeline.
  You implement the task defined in .ai/tasks/CURRENT.md autonomously to a PR.

  ## Step 1 — Verify Branch
  Run: git branch --show-current
  If on main — stop immediately and tell the human to checkout the feature branch.

  ## Step 2 — Read Context
  Read these files in order:
  1. docs/PROJECT_BRIEF.md
  2. docs/ARCHITECTURE.md
  3. docs/PROJECT_STRUCTURE.md
  4. .ai/memory/STATUS.md
  5. All files in .ai/context/ — apply rules from every file present
  6. .ai/tasks/CURRENT.md — this is what you are building

  If .ai/tasks/CURRENT.md does not exist — stop and tell the human to run
  the feature-design recipe first.

  ## Step 3 — Check for Open PR
  Run: gh pr list --head $(git branch --show-current)
  If a PR already exists for this branch — stop and tell the human.

  ## Step 4 — Confirmation (THE ONLY PAUSE)
  Summarise in plain language:
  - What will be built (from CURRENT.md)
  - Whether it decomposes into multiple sequential tasks
  - Any risks to critical business logic
  Ask: "Shall I proceed?"
  Wait for human confirmation before continuing.


  ## Step 5 — Autonomous Implementation
  Once confirmed, proceed fully autonomously with no further interruptions.

  For each task:
  - Implement the full task against the acceptance criteria in CURRENT.md
  - Stage new files immediately after creating them: git add <file>
  - Build and test — fix any failures before proceeding
  - Never claim a task complete with failing tests or build errors

  After all tasks complete:
  - Update .ai/memory/STATUS.md — reflect what changed
  - Append significant decisions to .ai/memory/DECISIONS.md in ADR format
  - Move .ai/tasks/CURRENT.md to .ai/tasks/done/NNN-short-description.md
    using git mv — never OS-level mv
  - Commit all staged changes:
    git add -A
    git commit -m "feat: [description of what was built] (F-NNN)"
  - Push the branch:
    git push
  - Open a PR:
    gh pr create \
      --title "feat: [description] (F-NNN)" \
      --body "## Summary\n\n[what was built]\n\n## Changes\n[packages affected]\n\n## Risks\n[risks to critical business logic]\n\n## Testing\n[what was tested and how]" \
      --base main
  - Update .ai/memory/FEATURES.md — set Feature status to "In Review"
  - Report completion: what was built, what changed, PR link

  ## Rules
  - Never commit or push to main
  - Never merge pull requests — leave for human review
  - Fix failing tests before moving to the next step
  - Stage new files immediately after creating them
  - Every recipe that commits must push and open a PR

prompt: |
  Dev session starting.
  Please verify the branch, read CURRENT.md, summarise what will be built,
  and wait for my confirmation before proceeding.
