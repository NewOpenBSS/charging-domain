version: "1.0.0"
title: "Dev Session"
description: "Stage 4 — Development. Bootstraps the workspace, reads CURRENT.md, and implements autonomously to PR. Designed to run on a self-hosted GitHub Actions runner."

parameters:
  - key: branch_name
    input_type: string
    requirement: required
    description: "Feature branch to implement (e.g. feature/F-001-charging-trace-store)"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true

settings:
  max_turns: 200

instructions: |
  You are running a Dev Session — Stage 4 of the agentic development pipeline.
  You bootstrap the workspace, read CURRENT.md, and implement autonomously to a PR.

  ## Step 1 — Bootstrap Workspace
  The repo has been checked out by GitHub Actions into the current directory
  on the feature branch. Verify the correct branch:

  git branch --show-current
  If not on {{ branch_name }}:
    git checkout {{ branch_name }} 2>/dev/null || git checkout -b {{ branch_name }} origin/{{ branch_name }}


  ## Step 2 — Read Context
  Read these files in order:
  1. docs/PROJECT_BRIEF.md
  2. docs/ARCHITECTURE.md
  3. docs/PROJECT_STRUCTURE.md
  4. .ai/memory/STATUS.md
  5. All files in .ai/context/ — apply rules from every file present
  6. .ai/tasks/CURRENT.md — this is what you are building

  If .ai/tasks/CURRENT.md does not exist — stop and report.
  The feature-design step must have failed to write CURRENT.md.

  ## Step 3 — Check Dependencies
  Read the Dependencies section of CURRENT.md.

  For each dependency branch listed (skip if "None"):
    Run: gh pr list --head <dependency-branch> --state merged --json number --jq length
    If the count is 0 — the dependency has NOT been merged yet.
    Stop and report:
    "This task depends on <branch> which has not been merged yet.
     Wait for that PR to be merged, then re-trigger this workflow."
    Exit without implementing anything.

  Only proceed if ALL dependencies are merged or there are no dependencies.

  ## Step 4 — Check for Open PR
  gh pr list --head {{ branch_name }}
  If a PR already exists — stop and report. Do not duplicate work.

  ## Step 5 — Confirmation
  Summarise in plain language:
  - What will be built (from CURRENT.md)
  - Whether it decomposes into multiple sequential tasks
  - Any risks to critical business logic

  Since branch_name was provided as a parameter, this is an automated run.
  Print the summary and proceed immediately — do NOT wait for human input.
  There is no human present to confirm.

  ## Step 6 — Autonomous Implementation
  Once confirmed, proceed fully autonomously with no further interruptions.

  For each task:
  - Implement against the acceptance criteria in CURRENT.md
  - Stage new files immediately: git add <file>
  - Build and test — fix all failures before proceeding
  - Never claim complete with failing tests or build errors

  After all tasks complete:
  - Update .ai/memory/STATUS.md
  - Append significant decisions to .ai/memory/DECISIONS.md in ADR format
  - Archive CURRENT.md:
    git mv .ai/tasks/CURRENT.md .ai/tasks/done/NNN-short-description.md
  - Commit all changes:
    git add -A
    git commit -m "feat: [description] ({{ branch_name }})"
  - Push:
    git push
  - Open PR:
    gh pr create \
      --title "feat: [description]" \
      --body "## Summary\n\n[what was built]\n\n## Changes\n[packages affected]\n\n## Risks\n[risks to critical business logic]\n\n## Testing\n[what was tested and how]" \
      --base main
  - Update .ai/memory/FEATURES.md — set Feature status to "In Review"
  - Commit and push the status update:
    git add .ai/memory/FEATURES.md
    git commit -m "status: F-NNN In Review"
    git push
  - Report completion: what was built, what changed, PR link

  ## Rules
  - Never commit or push to main
  - Never merge pull requests
  - Fix failing tests before moving forward
  - Stage new files immediately after creating them
  - Every commit must be pushed

prompt: |
  Dev session starting for {{ branch_name }}.
  Bootstrapping workspace, then reading CURRENT.md.
  Will summarise what will be built and wait for confirmation before proceeding.
