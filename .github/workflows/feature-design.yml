name: Feature Design (Stage 3)

on:
  push:
    branches:
      - 'feature/F-*'
    paths:
      - '.ai/tasks/DESIGN'

  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch to run feature design on'
        required: true

jobs:
  feature-design:
    name: Run Feature Design
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Run feature design recipe
        run: |
          goose run \
            --recipe .goose/recipes/feature-design.yaml \
            --params branch_name=${{ github.ref_name }}
        env:
          GOOSE_PATH_ROOT: ${{ github.workspace }}/.goose
          GOOSE_PROVIDER: claude-code
          GOOSE_MODEL: default
          GOOSE_MODE: auto
          GOOSE_DISABLE_SESSION_NAMING: "true"
