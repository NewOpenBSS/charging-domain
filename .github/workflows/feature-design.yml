name: Feature Design

on:
  push:
    branches:
      - 'feature/F-*'
    paths-ignore:
      - '.ai/tasks/CURRENT.md'
      - '.ai/tasks/done/**'

jobs:
  feature-design:
    name: Run Feature Design
    runs-on: self-hosted

    steps:
      - name: Run feature design recipe
        run: |
          goose run \
            --recipe ~/go-ocs/.ai/recipes/feature-design.yaml \
            --params branch_name=${{ github.ref_name }}
        env:
          GOOSE_PROVIDER: claude-code
          GOOSE_MODEL: default
