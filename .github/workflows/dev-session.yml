name: Dev Session (Stage 4)

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Feature branch to run dev session on'
        required: true
        type: string


jobs:
  dev-session:
    name: Run Dev Session
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch_name || github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure environment
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run dev session recipe
        id: goose
        run: |
          BRANCH="${{ github.event.inputs.branch_name || github.ref_name }}"
          goose run \
            --recipe .goose/recipes/dev-session.yaml \
            --params branch_name=${BRANCH}
        env:
          GOOSE_PATH_ROOT: ${{ github.workspace }}/.goose
          GOOSE_PROVIDER: claude-code
          GOOSE_MODEL: default
          GOOSE_MODE: auto
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOME: /home/eddiecarpenter

      - name: Push commits
        if: success()
        run: |
          BRANCH="${{ github.event.inputs.branch_name || github.ref_name }}"
          git push origin ${BRANCH}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open PR
        if: success()
        run: |
          BRANCH="${{ github.event.inputs.branch_name || github.ref_name }}"
          FEATURE_ID=$(echo "${BRANCH}" | sed 's/.*\(F-[0-9]*\).*/\1/')
          FEATURE_TITLE=$(grep "## ${FEATURE_ID} —" .ai/memory/FEATURES.md | sed 's/.*— //')
          gh pr create \
            --repo ${{ github.repository }} \
            --title "feat: ${FEATURE_ID} — ${FEATURE_TITLE}" \
            --body "## Feature ${FEATURE_ID}\n\nAll tasks implemented and tested.\nReview against acceptance criteria in \`.ai/memory/FEATURES.md\`." \
            --base main \
            --head ${BRANCH}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
