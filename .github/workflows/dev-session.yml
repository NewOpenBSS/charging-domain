name: Dev Session (Stage 4)

on:
  push:
    branches:
      - 'feature/F-*'
    paths:
      - '.ai/tasks/READY'

jobs:
  dev-session:
    name: Run Dev Session
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure environment
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run dev session recipe
        id: goose
        run: |
          goose run \
            --recipe .goose/recipes/dev-session.yaml \
            --params branch_name=${{ github.ref_name }}
        env:
          GOOSE_PATH_ROOT: ${{ github.workspace }}/.goose
          GOOSE_PROVIDER: claude-code
          GOOSE_MODEL: default
          GOOSE_MODE: auto
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOME: /home/eddiecarpenter

      - name: Push commits
        if: success()
        run: |
          git push origin ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open PR
        if: success()
        run: |
          FEATURE_ID=$(echo "${{ github.ref_name }}" | grep -oP 'F-\d+')
          FEATURE_TITLE=$(grep -A1 "## ${FEATURE_ID}" .ai/memory/FEATURES.md | tail -1 | sed 's/.*— //')
          gh pr create \
            --title "feat: ${FEATURE_ID} — ${FEATURE_TITLE}" \
            --body "## Feature ${FEATURE_ID}\n\nAll tasks implemented and tested.\nReview against acceptance criteria in \`.ai/memory/FEATURES.md\`." \
            --base main \
            --head ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
