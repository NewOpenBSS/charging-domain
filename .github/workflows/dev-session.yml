name: Dev Session (Stage 4)

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Feature branch to run dev session on'
        required: true
        type: string


jobs:
  dev-session:
    name: Run Dev Session
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch_name || github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GOOSE_AGENT_PAT }}

      - name: Configure environment
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          git config user.name "goose-agent"
          git config user.email "270002424+goose-agent@users.noreply.github.com"

      - name: Run dev session recipe
        id: goose
        run: |
          BRANCH="${{ github.event.inputs.branch_name || github.ref_name }}"
          # Retry up to 3 times to handle transient Claude Code rate-limit calculation errors.
          # Each retry picks up from the last committed task (done/ tasks are skipped).
          for attempt in 1 2 3; do
            echo "--- Dev session attempt ${attempt} ---"
            goose run \
              --recipe .goose/recipes/dev-session.yaml \
              --params branch_name=${BRANCH} && break
            EXIT_CODE=$?
            if [ $attempt -lt 3 ]; then
              echo "Attempt ${attempt} failed (exit ${EXIT_CODE}). Waiting 60s before retry..."
              sleep 60
            else
              echo "All ${attempt} attempts failed."
              exit $EXIT_CODE
            fi
          done
        env:
          GOOSE_PATH_ROOT: ${{ github.workspace }}/.goose
          GOOSE_PROVIDER: claude-code
          GOOSE_MODEL: default
          GOOSE_MODE: auto
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}
          HOME: /home/eddiecarpenter

      - name: Push commits
        if: success()
        run: |
          BRANCH="${{ github.event.inputs.branch_name || github.ref_name }}"
          git push origin ${BRANCH}
        env:
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}

      - name: Open PR
        if: success()
        run: |
          BRANCH="${{ github.event.inputs.branch_name || github.ref_name }}"
          FEATURE_ID=$(echo "${BRANCH}" | sed 's/.*\(F-[0-9]*\).*/\1/')
          FEATURE_TITLE=$(grep "## ${FEATURE_ID} —" .ai/memory/FEATURES.md | sed 's/.*— //')
          gh pr create \
            --repo ${{ github.repository }} \
            --title "feat: ${FEATURE_ID} — ${FEATURE_TITLE}" \
            --body "## Feature ${FEATURE_ID}\n\nAll tasks implemented and tested.\nReview against acceptance criteria in \`.ai/memory/FEATURES.md\`." \
            --base main \
            --head ${BRANCH}
        env:
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}
