name: Dev Session

on:
  push:
    branches:
      - 'feature/F-*'
    paths:
      - '.ai/tasks/CURRENT.md'

jobs:
  dev-session:
    name: Run Dev Session
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dev session recipe
        run: |
          goose run \
            --recipe .goose/recipes/dev-session.yaml \
            --params branch_name=${{ github.ref_name }} \
            --no-session
        env:
          GOOSE_PATH_ROOT: ${{ github.workspace }}/.goose
          GOOSE_PROVIDER: claude-code
          GOOSE_MODEL: default
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
