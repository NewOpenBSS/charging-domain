name: Dev Session

on:
  push:
    branches:
      - 'feature/F-*'
    paths:
      - '.ai/tasks/CURRENT.md'

jobs:
  dev-session:
    name: Run Dev Session
    runs-on: self-hosted

    steps:
      - name: Run dev session recipe
        run: |
          goose run \
            --recipe ~/go-ocs/.ai/recipes/dev-session.yaml \
            --params branch_name=${{ github.ref_name }} \
            --params repo_url=git@github.com:${{ github.repository }}.git
        env:
          GOOSE_PROVIDER: claude-code
          GOOSE_MODEL: default
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
