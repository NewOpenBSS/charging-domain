base:
  appName: "charging-backend"

  metrics:
    enabled: true
    addr: ":9091"
    path: "/metrics"

  logging:
    level: info
    format: json

  database:
    url: "postgres://gobss:gobss@localhost:5432/gobss?sslmode=disable&search_path=charging"

server:
  addr: ":8083"
  restPath: "/api/charging"
  graphqlPath: "/api/charging/graphql"
  readTimeout: "15s"
  writeTimeout: "15s"
  tenantRefreshInterval: "10m"

auth:
  enabled: false
  issuerUrl: "https://keycloak.example.com/realms/charging-realm"
  clientId: "charging-backend-client"
  audience: "charging-api"
  skipTLSVerify: false

kafka:
  enabled: false
  brokers:
    - "localhost:9092"
  requiredAcks: "all"
  topics:
    quota-journal: "public.quota-journal"
    notification-event: "public.notification"
    subscriber-event: "public.subscriber-event"
    wholesale-contract-event: "public.wholesale-contract-event"
    quota-provisioning: "public.quota-provisioning"
